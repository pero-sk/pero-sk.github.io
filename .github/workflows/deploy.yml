name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      # install root deps (adjust if monorepo)
      - run: npm ci

      - run: npm run build

      - run: |
          cd sino
          npm ci
          npm run build
          cd ..

      - run: |
          rm -rf dist
          mkdir -p dist

          cp -r vue-dist/* dist/

          mkdir -p dist/sino
          cp -r sino/build/* dist/sino/

      # deploy
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist